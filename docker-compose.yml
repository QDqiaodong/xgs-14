services:
  mysql:
    image: mysql:8.0
    container_name: xgs-14-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: chuanzi
      TZ: Asia/Shanghai
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --default-authentication-plugin=mysql_native_password
    ports:
      - "127.0.0.1:${MYSQL_HOST_PORT:-33144}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xgs-14-app
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      APP_PORT: 8080
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: chuanzi
      DB_USER: root
      DB_PASSWORD: root
      SESSION_TTL_HOURS: 24
      APP_PASSWORD_SALT: chuanzi-default-salt
      WEB_ROOT: /app/web
      JAVA_TOOL_OPTIONS: -Dfile.encoding=UTF-8 -Dsun.jnu.encoding=UTF-8
      LANG: C.UTF-8
    ports:
      - "127.0.0.1:${APP_HOST_PORT:-18144}:8080"

volumes:
  mysql_data:
